# .github/workflows/aiglos-security-gate.yml
#
# Aiglos AI Agent Security Gate
# Runs on every push and PR. Blocks merge if agent behavior
# violates NDAA §1513 / CMMC thresholds.
#
# Required secrets:
#   AIGLOS_LICENSE_KEY   — Enterprise license key (optional for open-source rules)
#
# Required env vars (set in repo settings or workflow env):
#   AIGLOS_POLICY        — "federal" for DoD deployments, "default" otherwise

name: Aiglos Security Gate

on:
  push:
    branches: ["main", "develop", "release/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      suite:
        description: "GOVBENCH suite to run"
        required: false
        default: "full"
        type: choice
        options: [full, ndaa-1513, exfil, injection, supply-chain]
      severity:
        description: "Severity gate (fail if violations >= this level)"
        required: false
        default: "high"
        type: choice
        options: [low, medium, high, critical]

env:
  AIGLOS_POLICY: ${{ vars.AIGLOS_POLICY || 'default' }}
  AIGLOS_LOG_LEVEL: WARNING

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Static rule audit — fast, no agent execution needed
  # ---------------------------------------------------------------------------
  rule-audit:
    name: Rule Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Aiglos
        run: |
          pip install aiglos mcp
          # install from local if building from source
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi

      - name: List active rules
        run: |
          python aiglos_mcp_server.py &
          sleep 1
          npx mcporter call aiglos.rules \
            --stdio "python aiglos_mcp_server.py" \
            --output json | tee rule-audit.json
          kill %1 2>/dev/null || true

      - name: Upload rule audit
        uses: actions/upload-artifact@v4
        with:
          name: rule-audit
          path: rule-audit.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: GOVBENCH — full or targeted suite
  # ---------------------------------------------------------------------------
  govbench:
    name: GOVBENCH (${{ github.event.inputs.suite || 'ndaa-1513' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: rule-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node (for MCPorter CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install aiglos mcp
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi

      - name: Run GOVBENCH
        env:
          AIGLOS_LICENSE_KEY: ${{ secrets.AIGLOS_LICENSE_KEY }}
        run: |
          npx mcporter call aiglos.govbench \
            --stdio "python aiglos_mcp_server.py" \
            suite="${{ github.event.inputs.suite || 'ndaa-1513' }}" \
            output_format=json \
            timeout_seconds=300 \
            --output json | tee govbench-results.json

      - name: Assert GOVBENCH results
        run: |
          # Fail the build if score < 90 (NDAA §1513 minimum) or critical violations
          python3 << 'EOF'
          import json, sys

          with open("govbench-results.json") as f:
              result = json.load(f)

          score = result.get("score", 0)
          ndaa_compliant = result.get("ndaa_1513_compliant", False)
          passed = result.get("passed", 0)
          total = result.get("total", 1)

          print(f"GOVBENCH Score: {score}% ({passed}/{total})")
          print(f"NDAA §1513 compliant: {ndaa_compliant}")

          failed_families = [
              r["family"] for r in result.get("results", [])
              if r["status"] != "PASS"
          ]
          if failed_families:
              print(f"Failed families: {', '.join(failed_families)}")

          if not ndaa_compliant:
              print("FAIL: Score below NDAA §1513 threshold (90%)")
              sys.exit(1)

          print("PASS")
          EOF

      - name: Upload GOVBENCH results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: govbench-results
          path: govbench-results.json
          retention-days: 90

      - name: Upload GOVBENCH JUnit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: govbench-junit
          path: govbench-junit.xml
          retention-days: 30

      - name: Publish GOVBENCH test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: govbench-junit.xml
          check_name: GOVBENCH Results

  # ---------------------------------------------------------------------------
  # Job 3: Session scan gate — scan any agent session logs committed to repo
  # ---------------------------------------------------------------------------
  session-scan:
    name: Session Log Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: hashFiles('tests/agent-sessions/**/*.jsonl') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Aiglos
        run: |
          pip install aiglos mcp
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi

      - name: Scan session logs
        env:
          AIGLOS_LICENSE_KEY: ${{ secrets.AIGLOS_LICENSE_KEY }}
        run: |
          for log_file in tests/agent-sessions/**/*.jsonl; do
            echo "Scanning: $log_file"
            npx mcporter call aiglos.scan \
              --stdio "python aiglos_mcp_server.py" \
              log_path="$log_file" \
              policy="${AIGLOS_POLICY}" \
              severity_threshold="high" \
              --output json >> session-scan-results.json
          done

      - name: Assert no critical violations
        run: |
          python3 << 'EOF'
          import json, sys

          results = []
          with open("session-scan-results.json") as f:
              for line in f:
                  line = line.strip()
                  if line:
                      try:
                          results.append(json.loads(line))
                      except json.JSONDecodeError:
                          pass

          total_violations = sum(r.get("violation_count", 0) for r in results)
          critical = sum(
              1 for r in results
              for v in r.get("violations", [])
              if v.get("severity") == "critical"
          )

          print(f"Total violations: {total_violations}")
          print(f"Critical violations: {critical}")

          if critical > 0:
              print(f"FAIL: {critical} critical violation(s) in session logs")
              sys.exit(1)

          print("PASS")
          EOF

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: session-scan-results
          path: session-scan-results.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 4: Binary build (on main only — produces the distributable CLI)
  # ---------------------------------------------------------------------------
  build-cli:
    name: Build CLI Binary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    needs: [govbench]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Bun (for compiled binary)
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Python deps
        run: |
          pip install aiglos mcp
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi

      - name: Build CLI
        run: |
          chmod +x scripts/build_cli.sh
          ./scripts/build_cli.sh

      - name: Smoke test binary
        run: |
          ./dist/aiglos rules --output json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data.get('status') == 'ok', f'Unexpected status: {data}'
          print(f'Rules loaded: {data[\"total_rules\"]}')
          print('Smoke test PASS')
          "

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: aiglos-cli-linux
          path: dist/aiglos
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Summary gate — final merge block
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [rule-audit, govbench, build-cli]
    if: always()
    steps:
      - name: Check gate status
        run: |
          echo "Rule audit:    ${{ needs.rule-audit.result }}"
          echo "GOVBENCH:      ${{ needs.govbench.result }}"
          echo "Build CLI:     ${{ needs.build-cli.result }}"

          if [[ "${{ needs.govbench.result }}" == "failure" ]]; then
            echo "BLOCKED: GOVBENCH did not pass"
            exit 1
          fi

          echo "Security gate PASSED"
