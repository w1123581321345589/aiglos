name: Aiglos Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    # Nightly scan at 6am UTC -- mirrors the --schedule nightly CLI behavior
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      deep:
        description: 'Run deep scan (injection scan, reputation check, citation coverage)'
        required: false
        default: 'false'
        type: boolean
      fail_below_grade:
        description: 'Fail the build if grade is below this (A/B/C/D)'
        required: false
        default: 'C'
        type: choice
        options: [A, B, C, D]

# Permissions -- read-only except for writing PR comments
permissions:
  contents: read
  pull-requests: write
  security-events: write   # for SARIF upload

jobs:
  aiglos-scan:
    name: Aiglos Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Aiglos
        run: |
          pip install aiglos --quiet

      - name: Run Aiglos audit
        id: audit
        run: |
          # Determine flags
          DEEP_FLAG=""
          if [ "${{ github.event.inputs.deep }}" = "true" ] || \
             [ "${{ github.event_name }}" = "schedule" ]; then
            DEEP_FLAG="--deep"
            echo "Running deep scan..."
          fi

          # Run audit and capture output
          aiglos audit $DEEP_FLAG --format json > aiglos-audit.json 2>&1 || true
          aiglos audit $DEEP_FLAG --format summary > aiglos-audit-summary.txt 2>&1 || true

          # Extract grade and score for downstream steps
          GRADE=$(python3 -c "
          import json
          with open('aiglos-audit.json') as f:
              d = json.load(f)
          print(d.get('grade', 'F'))
          " 2>/dev/null || echo "F")

          SCORE=$(python3 -c "
          import json
          with open('aiglos-audit.json') as f:
              d = json.load(f)
          print(d.get('score', 0))
          " 2>/dev/null || echo "0")

          echo "grade=$GRADE" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Aiglos Security Grade: $GRADE ($SCORE/100)"

      - name: Display audit summary
        run: |
          cat aiglos-audit-summary.txt || echo "Audit summary not available"

      - name: Check grade threshold
        run: |
          GRADE="${{ steps.audit.outputs.grade }}"
          THRESHOLD="${{ github.event.inputs.fail_below_grade || 'C' }}"

          # Grade ordering: A=1, B=2, C=3, D=4, F=5
          grade_to_num() {
            case $1 in A) echo 1;; B) echo 2;; C) echo 3;; D) echo 4;; *) echo 5;; esac
          }

          GRADE_NUM=$(grade_to_num $GRADE)
          THRESHOLD_NUM=$(grade_to_num $THRESHOLD)

          if [ $GRADE_NUM -gt $THRESHOLD_NUM ]; then
            echo "::error::Aiglos security grade $GRADE is below required threshold $THRESHOLD"
            exit 1
          else
            echo "Security grade $GRADE meets threshold $THRESHOLD ✓"
          fi

      - name: Comment on PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary = '';
            try {
              summary = fs.readFileSync('aiglos-audit-summary.txt', 'utf8');
            } catch (e) {
              summary = 'Audit summary not available';
            }

            const grade = '${{ steps.audit.outputs.grade }}';
            const score = '${{ steps.audit.outputs.score }}';

            const gradeEmoji = {
              'A': '🟢', 'B': '🟡', 'C': '🟠', 'D': '🔴', 'F': '⛔'
            }[grade] || '❓';

            const body = [
              `## ${gradeEmoji} Aiglos Security Audit`,
              ``,
              `**Grade:** ${grade} (${score}/100)`,
              ``,
              `<details>`,
              `<summary>Full audit output</summary>`,
              ``,
              '```',
              summary.slice(0, 4000),  // GitHub comment limit
              '```',
              `</details>`,
              ``,
              `Run \`aiglos audit --deep\` locally for the full report.`,
            ].join('\n');

            // Find existing Aiglos comment to update rather than create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('Aiglos Security Audit') &&
              c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload audit results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aiglos-audit-${{ github.run_number }}
          path: |
            aiglos-audit.json
            aiglos-audit-summary.txt
          retention-days: 30

      - name: Generate SARIF output for GitHub Security tab
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, time, os

          try:
              with open('aiglos-audit.json') as f:
                  audit = json.load(f)
          except Exception:
              audit = {"checks": [], "grade": "F", "score": 0}

          findings = [c for c in audit.get("checks", [])
                      if c["severity"] in ("CRITICAL", "FAIL", "WARN")]

          # Map severity to SARIF level
          level_map = {"CRITICAL": "error", "FAIL": "error", "WARN": "warning"}

          results = []
          for f in findings:
              results.append({
                  "ruleId":   f.get("id", "aiglos-finding"),
                  "level":    level_map.get(f["severity"], "note"),
                  "message":  {"text": f"{f['name']}: {f.get('detail', '')}"},
                  "locations": [{"physicalLocation": {
                      "artifactLocation": {"uri": "."}
                  }}],
              })

          sarif = {
              "version": "2.1.0",
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "Aiglos",
                          "version": audit.get("aiglos_version", "0.18.0"),
                          "informationUri": "https://aiglos.dev",
                          "rules": [],
                      }
                  },
                  "results": results,
              }],
          }

          with open("aiglos-results.sarif", "w") as f:
              json.dump(sarif, f, indent=2)

          print(f"SARIF: {len(results)} findings exported")
          PYEOF

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: aiglos-results.sarif
          category: aiglos-security

      - name: Nightly briefing summary
        if: github.event_name == 'schedule'
        run: |
          echo "## 🔐 Aiglos Nightly Security Briefing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Grade:** ${{ steps.audit.outputs.grade }} (${{ steps.audit.outputs.score }}/100)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat aiglos-audit-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Do not auto-fix. Review each finding manually._" >> $GITHUB_STEP_SUMMARY
